<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Roadmap Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:      #0d0d0d;
    --bg-surface:   #161616;
    --bg-raised:    #1e1e1e;
    --bg-hover:     #242424;
    --border:       rgba(255,255,255,0.07);
    --border-med:   rgba(255,255,255,0.12);
    --text-primary: #e8e8e6;
    --text-secondary: #8a8a85;
    --text-muted:   #555550;
    --accent:       #c5a880;
    --accent-dim:   rgba(197,168,128,0.12);
    --accent-glow:  rgba(197,168,128,0.06);
    --check-bg:     #c5a880;
    --check-text:   #1a1408;
    --complete-bg:  rgba(100,180,120,0.1);
    --complete-text:#6db87a;
    --complete-border: rgba(100,180,120,0.2);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 220px;
    height: 100vh;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 0 18px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-logo .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--check-text);
    margin-bottom: 10px;
  }

  .sidebar-logo h1 {
    font-size: 13px; font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .sidebar-logo p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 0 10px;
    overflow-y: auto;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
    margin-bottom: 2px;
  }

  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-med);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .nav-item.active .dot { background: var(--accent); }
  .nav-item.done-nav .dot { background: #6db87a; }

  .sidebar-footer {
    padding: 16px 18px 0;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .sidebar-footer .date-str {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Main ── */
  .main {
    margin-left: 220px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }

  .topbar-left h2 {
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
  }

  .topbar-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .goal-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 7px 12px;
    transition: border-color 0.2s;
    flex: 1;
    max-width: 340px;
  }

  .goal-input-wrap:focus-within {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .goal-input-wrap svg {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .goal-input-wrap input {
    background: none; border: none; outline: none;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text-primary);
    width: 100%;
    caret-color: var(--accent);
  }

  .goal-input-wrap input::placeholder { color: var(--text-muted); }

  /* ── Content ── */
  .content {
    padding: 28px;
    flex: 1;
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border-med); }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }

  .stat-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Overall progress ── */
  .progress-section {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 28px;
    animation: fadeUp 0.45s ease both;
  }

  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }

  .progress-header span {
    font-size: 13px; font-weight: 500;
    color: var(--text-primary);
  }

  .progress-header .pct {
    font-size: 12px; color: var(--text-secondary);
  }

  .progress-track {
    height: 4px;
    background: var(--bg-hover);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  }

  .month-progress-dots {
    display: flex; gap: 6px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .month-dot {
    font-size: 10.5px;
    padding: 3px 9px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: transparent;
    transition: all 0.2s;
    cursor: pointer;
    white-space: nowrap;
  }

  .month-dot:hover { border-color: var(--border-med); color: var(--text-secondary); }
  .month-dot.active-dot { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .month-dot.done-dot { border-color: var(--complete-border); color: var(--complete-text); background: var(--complete-bg); }

  /* ── Grid ── */
  .months-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .month-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    animation: cardIn 0.4s ease forwards;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .month-card:hover {
    border-color: var(--border-med);
  }

  .month-card.all-done {
    border-color: var(--complete-border);
  }

  .card-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }

  .card-header-left {
    display: flex; align-items: center; gap: 10px;
  }

  .month-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    background: var(--bg-hover);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .month-card.all-done .month-icon {
    background: var(--complete-bg);
    border-color: var(--complete-border);
  }

  .month-title {
    font-size: 13.5px; font-weight: 500;
    color: var(--text-primary);
  }

  .month-num {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .month-badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 400;
    flex-shrink: 0;
  }

  .badge-default {
    background: var(--bg-hover);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .badge-done {
    background: var(--complete-bg);
    color: var(--complete-text);
    border: 1px solid var(--complete-border);
  }

  /* ── Task list ── */
  .task-list {
    padding: 8px 6px;
  }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .task-item:hover { background: var(--bg-hover); }

  .task-check {
    width: 17px; height: 17px;
    border-radius: 4px;
    border: 1.5px solid var(--border-med);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    font-size: 9px;
    color: transparent;
  }

  .task-item.done .task-check {
    background: var(--check-bg);
    border-color: var(--check-bg);
    color: var(--check-text);
    transform: scale(1.05);
  }

  .task-check svg { flex-shrink: 0; }

  .task-label {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    transition: color 0.15s;
  }

  .task-item:hover .task-label { color: var(--text-primary); }

  .task-item.done .task-label {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: var(--border-med);
  }

  /* ── Card footer ── */
  .card-footer {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
  }

  .card-mini-bar {
    height: 2px;
    background: var(--bg-hover);
    border-radius: 99px;
    overflow: hidden;
  }

  .card-mini-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .month-card.all-done .card-mini-fill { background: #6db87a; }

  .card-footer-text {
    display: flex; justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .topbar { padding: 12px 16px; flex-wrap: wrap; }
    .content { padding: 16px; }
    .months-grid { grid-template-columns: 1fr; }
    .goal-input-wrap { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" aria-label="Navigation">
  <div class="sidebar-logo">
    <div class="logo-mark">AI</div>
    <h1>Jai Neem Karoli Baba</h1>
    <p>Learning Roadmap</p>
  </div>

  <nav class="sidebar-nav">
    <p class="nav-label">Months</p>
    <div id="sidebar-nav"></div>
  </nav>

  <div class="sidebar-footer">
    <p class="date-str" id="sidebar-date"></p>
  </div>
</aside>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <h2>Roadmap Tracker</h2>
      <p>Track your AI learning journey</p>
    </div>
    <div class="goal-input-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.5"/><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/>
      </svg>
      <input id="goal-input" type="text" placeholder="What's your goal for this journey?" aria-label="Set your learning goal" />
    </div>
  </header>

  <!-- Content -->
  <main class="content">

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Overall progress -->
    <div class="progress-section">
      <div class="progress-header">
        <span>Overall progress</span>
        <span class="pct" id="overall-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="overall-fill" style="width:0%"></div>
      </div>
      <div class="month-progress-dots" id="month-dots"></div>
    </div>

    <!-- Cards -->
    <div class="months-grid" id="months-grid"></div>

  </main>
</div>

<script>
const ROADMAP = {
  "July":      { icon: "💻", tasks: ["JavaScript basics","HTML + CSS advanced","Portfolio website","Git + GitHub"] },
  "August":    { icon: "⚙️", tasks: ["Node.js basics","Express APIs","MongoDB / Firebase","Login system"] },
  "September": { icon: "🧠", tasks: ["Python basics","Neural networks intro","PyTorch basics","Small AI model"] },
  "October":   { icon: "🤖", tasks: ["Transformers deep dive","Tokenization","Hugging Face","Chatbot project"] },
  "November":  { icon: "🔍", tasks: ["RAG systems","Embeddings","Vector DB basics","AI assistant project"] },
  "December":  { icon: "🚀", tasks: ["Deployment","Capstone project","AI portfolio site","Revision + polish"] }
};

function loadState() {
  try { return JSON.parse(localStorage.getItem("roadmap_dark") || "{}"); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem("roadmap_dark", JSON.stringify(s)); } catch {}
}

let state = loadState();

function toggle(month, task) {
  if (!state[month]) state[month] = {};
  state[month][task] = !state[month][task];
  saveState(state);
  render();
}

function getOverall() {
  let total = 0, done = 0;
  for (const m in ROADMAP) {
    ROADMAP[m].tasks.forEach(t => { total++; if (state[m]?.[t]) done++; });
  }
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

function getMonthStats(month) {
  const tasks = ROADMAP[month].tasks;
  const done = tasks.filter(t => state[month]?.[t]).length;
  return { done, total: tasks.length, pct: Math.round((done/tasks.length)*100) };
}

function getMonthsComplete() {
  return Object.keys(ROADMAP).filter(m => {
    const { done, total } = getMonthStats(m);
    return done === total;
  }).length;
}

function render() {
  const { total, done, pct } = getOverall();
  const monthsComplete = getMonthsComplete();

  // Stats
  const statsRow = document.getElementById("stats-row");
  statsRow.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Tasks done</div>
      <div class="stat-value accent">${done}</div>
      <div class="stat-sub">of ${total} total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Months complete</div>
      <div class="stat-value">${monthsComplete}</div>
      <div class="stat-sub">of ${Object.keys(ROADMAP).length} months</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Progress</div>
      <div class="stat-value accent">${pct}%</div>
      <div class="stat-sub">overall completion</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div class="stat-value">${total - done}</div>
      <div class="stat-sub">tasks left</div>
    </div>
  `;

  // Overall bar
  document.getElementById("overall-fill").style.width = pct + "%";
  document.getElementById("overall-pct").textContent = pct + "%";

  // Month dots
  const dotsEl = document.getElementById("month-dots");
  dotsEl.innerHTML = Object.entries(ROADMAP).map(([month]) => {
    const { done: md, total: mt } = getMonthStats(month);
    const allDone = md === mt;
    const cls = allDone ? "month-dot done-dot" : "month-dot";
    return `<span class="${cls}" onclick="document.getElementById('card-${month}').scrollIntoView({behavior:'smooth',block:'nearest'})">${month} ${md}/${mt}</span>`;
  }).join("");

  // Sidebar nav
  const nav = document.getElementById("sidebar-nav");
  nav.innerHTML = Object.entries(ROADMAP).map(([month]) => {
    const { done: md, total: mt } = getMonthStats(month);
    const allDone = md === mt;
    return `<a class="nav-item${allDone ? " done-nav" : ""}" onclick="document.getElementById('card-${month}').scrollIntoView({behavior:'smooth',block:'start'})" href="#">
      <span class="dot"></span>${month} <span style="margin-left:auto;font-size:10.5px;color:var(--text-muted)">${md}/${mt}</span>
    </a>`;
  }).join("");

  // Cards
  const grid = document.getElementById("months-grid");
  grid.innerHTML = "";

  Object.entries(ROADMAP).forEach(([month, { icon, tasks }], idx) => {
    const { done: md, total: mt, pct: mp } = getMonthStats(month);
    const allDone = md === mt;

    const card = document.createElement("div");
    card.className = "month-card" + (allDone ? " all-done" : "");
    card.id = "card-" + month;
    card.style.animationDelay = (idx * 0.07) + "s";

    const badge = allDone
      ? `<span class="month-badge badge-done">Complete ✓</span>`
      : `<span class="month-badge badge-default">${md} / ${mt}</span>`;

    const taskItems = tasks.map(task => {
      const isDone = !!state[month]?.[task];
      return `<div class="task-item${isDone ? " done" : ""}" onclick="toggle('${month}','${task.replace(/'/g,"\\'")}')" role="button" tabindex="0" aria-pressed="${isDone}" aria-label="${task}">
        <div class="task-check" aria-hidden="true">
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,5 4,7.5 8.5,2.5"/>
          </svg>
        </div>
        <span class="task-label">${task}</span>
      </div>`;
    }).join("");

    card.innerHTML = `
      <div class="card-header">
        <div class="card-header-left">
          <div class="month-icon" aria-hidden="true">${icon}</div>
          <div>
            <div class="month-title">${month}</div>
            <div class="month-num">${md} of ${mt} tasks</div>
          </div>
        </div>
        ${badge}
      </div>
      <div class="task-list">${taskItems}</div>
      <div class="card-footer">
        <div class="card-mini-bar">
          <div class="card-mini-fill" style="width:${mp}%"></div>
        </div>
        <div class="card-footer-text">
          <span>${mp}% complete</span>
          ${allDone ? '<span style="color:var(--complete-text)">All done ✓</span>' : `<span>${mt - md} remaining</span>`}
        </div>
      </div>`;

    grid.appendChild(card);
  });

  card_keyboard();
}

function card_keyboard() {
  document.querySelectorAll('.task-item').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
    });
  });
}

// Date
const d = new Date();
document.getElementById("sidebar-date").textContent = d.toLocaleDateString("en-IN", {
  weekday: "short", year: "numeric", month: "short", day: "numeric"
});

// Goal input
const goalInput = document.getElementById("goal-input");
try { goalInput.value = localStorage.getItem("goal_dark") || ""; } catch {}
goalInput.addEventListener("input", e => {
  try { localStorage.setItem("goal_dark", e.target.value); } catch {}
});

render();
</script>
</body>
</html>
