<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Roadmap Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
 <link rel="icon" type="image/png" href="favicon.png">
   <link rel="stylesheet" href="assets/style.css">

</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" aria-label="Navigation">
  <div class="sidebar-logo">
    <div class="logo-mark">AI</div>
    <h1>Jai Neem Karoli Baba</h1>
    <p>Learning Roadmap</p>
  </div>

  <nav class="sidebar-nav">
    <p class="nav-label">Months</p>
    <div id="sidebar-nav"></div>
  </nav>

  <div class="sidebar-footer">
    <p class="date-str" id="sidebar-date"></p>
  </div>
</aside>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <h2>Roadmap Tracker</h2>
      <p>Track your AI learning journey</p>
    </div>
    <div class="goal-input-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.5"/><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/>
      </svg>
      <input id="goal-input" type="text" placeholder="What's your goal for this journey?" aria-label="Set your learning goal" />
    </div>
  </header>

  <!-- Content -->
  <main class="content">

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Overall progress -->
    <div class="progress-section">
      <div class="progress-header">
        <span>Overall progress</span>
        <span class="pct" id="overall-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="overall-fill" style="width:0%"></div>
      </div>
      <div class="month-progress-dots" id="month-dots"></div>
    </div>

    <!-- Cards -->
    <div class="months-grid" id="months-grid"></div>

  </main>
</div>
   <script src="assets/script.js"></script>
</body>
</html>
